name: GitHub Pages へデプロイ

on:
  push:
    branches: ['main']

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: 依存関係インストール
        run: npm ci

      - name: ビルド
        run: npm run build

      - name: Pages 設定
        uses: actions/configure-pages@v5

      - name: アーティファクトのアップロード
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: GitHub Pages にデプロイ
        id: deployment
        uses: actions/deploy-pages@v4
